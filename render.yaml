# Render Blueprint — deploy with "render blueprint launch"
databases:
  - name: cubsedge-db
    plan: free
    databaseName: cubsedge
    user: cubsedge

services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: cubsedge-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cubsedge-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://cubsstats.live,https://www.cubsstats.live
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard

  # ── Cron scheduler ───────────────────────────────────────────
  - type: worker
    name: cubsedge-scheduler
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: python -m scripts.scheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cubsedge-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Frontend (static site) ──────────────────────────────────
  - type: web
    name: cubsedge-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /api/*
        destination: https://cubsedge-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://cubsedge-api.onrender.com

databases:
  - name: cubsstats-db
    plan: free
    databaseName: cubsstats
    user: cubsstats

services:
  - type: web
    name: cubsstats-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cubsstats-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://cubsstats.live
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: cubsstats-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://cubsstats-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: cron
    name: cubsstats-game-watcher
    runtime: python
    schedule: "0 22-23,0-4 * * *"
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python scripts/game_watcher.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cubsstats-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: cron
    name: cubsstats-statcast-backfill
    runtime: python
    schedule: "0 15 * * *"
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python scripts/statcast_backfill.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cubsstats-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: cron
    name: cubsstats-weekly-refresh
    runtime: python
    schedule: "0 5 * * 0"
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python scripts/weekly_refresh.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cubsstats-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
